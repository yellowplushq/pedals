name: Pedals
options:
  bundleIdPrefix: in.eyhn
  deploymentTarget:
    iOS: "26.0"
    watchOS: "26.0"
  createIntermediateGroups: true

packages:
  PedalsKit:
    path: ../shared/PedalsKit
  GhosttyKit:
    url: https://github.com/Lakr233/libghostty-spm
    from: 1.3.0

targets:
  Pedals:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - Sources
      - Resources
      - SharedStatus
    dependencies:
      - package: PedalsKit
        product: PedalsKit
      - package: GhosttyKit
        product: GhosttyTerminal
      - package: GhosttyKit
        product: GhosttyTheme
      - target: PedalsWidgets
      - target: PedalsWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: in.eyhn.pedals
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 5RWWZ7DDG9
        APS_ENVIRONMENT: development
      configs:
        Release:
          APS_ENVIRONMENT: production
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: iPhone Distribution
          PROVISIONING_PROFILE_SPECIFIER: Pedals Eyhn App Store
    entitlements:
      path: Entitlements/Pedals.entitlements
      properties:
        aps-environment: $(APS_ENVIRONMENT)
        com.apple.security.application-groups:
          - group.in.eyhn.pedals
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Pedals
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        UILaunchStoryboardName: LaunchScreen
        NSSupportsLiveActivities: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    scheme:
      testTargets:
        - PedalsStatusTests

  PedalsStatusTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - Tests
    dependencies:
      - target: Pedals
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: in.eyhn.pedals.tests
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 5RWWZ7DDG9

  PedalsWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - Widgets
      - path: SharedStatus
        excludes:
          - IOSWatchConnectivityBridge.swift
          - TTYLiveActivityController.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: in.eyhn.pedals.widgets
        PRODUCT_NAME: PedalsWidgets
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 5RWWZ7DDG9
        APS_ENVIRONMENT: development
        APPLICATION_EXTENSION_API_ONLY: true
        SKIP_INSTALL: true
      configs:
        Release:
          APS_ENVIRONMENT: production
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: iPhone Distribution
          PROVISIONING_PROFILE_SPECIFIER: Pedals Widgets Eyhn App Store
    entitlements:
      path: Entitlements/PedalsWidgets.entitlements
      properties:
        aps-environment: $(APS_ENVIRONMENT)
        com.apple.security.application-groups:
          - group.in.eyhn.pedals
    info:
      path: Widgets/Info.plist
      properties:
        CFBundleDisplayName: Pedals Widgets
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  PedalsWatch:
    # Xcode 14+ single-target SwiftUI watch app: code lives directly in an
    # application target (there is no legacy WatchKit extension target).
    type: application
    platform: watchOS
    deploymentTarget: "26.0"
    sources:
      - WatchApp
      - path: SharedStatus
        excludes:
          - IOSWatchConnectivityBridge.swift
          - TTYActivityAttributes.swift
          - TTYLiveActivityController.swift
    dependencies:
      - target: PedalsWatchWidgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: in.eyhn.pedals.watchapp
        PRODUCT_NAME: PedalsWatch
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "4"
        SWIFT_VERSION: "6.0"
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 5RWWZ7DDG9
        SKIP_INSTALL: true
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: iPhone Distribution
          PROVISIONING_PROFILE_SPECIFIER: Pedals Watch Eyhn App Store
    entitlements:
      path: Entitlements/PedalsWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - group.in.eyhn.pedals
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: Pedals
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        WKApplication: true
        WKCompanionAppBundleIdentifier: in.eyhn.pedals

  PedalsWatchWidgets:
    type: app-extension
    platform: watchOS
    deploymentTarget: "26.0"
    sources:
      - WatchWidgets
      - path: SharedStatus
        excludes:
          - IOSWatchConnectivityBridge.swift
          - TTYActivityAttributes.swift
          - TTYLiveActivityController.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: in.eyhn.pedals.watchapp.widgets
        PRODUCT_NAME: PedalsWatchWidgets
        TARGETED_DEVICE_FAMILY: "4"
        SWIFT_VERSION: "6.0"
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 5RWWZ7DDG9
        APS_ENVIRONMENT: development
        APPLICATION_EXTENSION_API_ONLY: true
        SKIP_INSTALL: true
      configs:
        Release:
          APS_ENVIRONMENT: production
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: iPhone Distribution
          PROVISIONING_PROFILE_SPECIFIER: Pedals Watch Widgets Eyhn App Store
    entitlements:
      path: Entitlements/PedalsWatchWidgets.entitlements
      properties:
        aps-environment: $(APS_ENVIRONMENT)
        com.apple.security.application-groups:
          - group.in.eyhn.pedals
    info:
      path: WatchWidgets/Info.plist
      properties:
        CFBundleDisplayName: Pedals Watch Widgets
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
