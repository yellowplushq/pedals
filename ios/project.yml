name: Pedals
options:
  bundleIdPrefix: air.build
  deploymentTarget:
    iOS: "26.0"
    watchOS: "26.0"
  createIntermediateGroups: true

packages:
  PedalsKit:
    path: ../shared/PedalsKit
  GhosttyKit:
    url: https://github.com/Lakr233/libghostty-spm
    from: 1.3.0

targets:
  Pedals:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - Sources
      - Resources
      - SharedStatus
    dependencies:
      - package: PedalsKit
        product: PedalsKit
      - package: GhosttyKit
        product: GhosttyTerminal
      - package: GhosttyKit
        product: GhosttyTheme
      - target: PedalsWidgets
      - target: PedalsWatch
      # TODO: re-embed once the "Pedals NSE YellowPlus App Store" profile
      # exists in the developer portal — without the NSE, agent notifications
      # deliver with the generic per-category text instead of the decrypted
      # rich content. Everything else is unaffected.
      # - target: PedalsNotificationService
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: air.build.pedals
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        CURRENT_PROJECT_VERSION: "9"
        MARKETING_VERSION: "1.0.1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: QDJ93ZUQ9B
        APS_ENVIRONMENT: development
      configs:
        Release:
          APS_ENVIRONMENT: production
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: iPhone Distribution
          PROVISIONING_PROFILE_SPECIFIER: Pedals YellowPlus App Store
    entitlements:
      path: Entitlements/Pedals.entitlements
      properties:
        aps-environment: $(APS_ENVIRONMENT)
        com.apple.security.application-groups:
          - group.air.build.pedals
        # App-id group FIRST so it stays the default write group; the shared
        # group carries only the derived notification keys the NSE reads.
        keychain-access-groups:
          - $(AppIdentifierPrefix)air.build.pedals
          - $(AppIdentifierPrefix)air.build.pedals.shared
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Pedals
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        UILaunchStoryboardName: LaunchScreen
        NSSupportsLiveActivities: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    scheme:
      testTargets:
        - PedalsStatusTests

  PedalsStatusTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - Tests
    dependencies:
      - target: Pedals
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: air.build.pedals.tests
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: QDJ93ZUQ9B

  PedalsWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - Widgets
      - path: SharedStatus
        excludes:
          - IOSWatchConnectivityBridge.swift
          - TTYLiveActivityController.swift
          - WatchTerminalContext.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: air.build.pedals.widgets
        PRODUCT_NAME: PedalsWidgets
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        CURRENT_PROJECT_VERSION: "9"
        MARKETING_VERSION: "1.0.1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: QDJ93ZUQ9B
        APS_ENVIRONMENT: development
        APPLICATION_EXTENSION_API_ONLY: true
        SKIP_INSTALL: true
      configs:
        Release:
          APS_ENVIRONMENT: production
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: iPhone Distribution
          PROVISIONING_PROFILE_SPECIFIER: Pedals Widgets YellowPlus App Store
    entitlements:
      path: Entitlements/PedalsWidgets.entitlements
      properties:
        aps-environment: $(APS_ENVIRONMENT)
        com.apple.security.application-groups:
          - group.air.build.pedals
    info:
      path: Widgets/Info.plist
      properties:
        CFBundleDisplayName: Pedals Widgets
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  PedalsNotificationService:
    # Rewrites the generic agent-notification push with the E2EE content: decrypts
    # the sealed payload with the per-computer notification key from the
    # shared keychain group (AGENT_MONITORING_DESIGN.md §6).
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - NSE
      - SharedStatus/AgentNotificationKeyStore.swift
    dependencies:
      - package: PedalsKit
        product: PedalsKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: air.build.pedals.nse
        PRODUCT_NAME: PedalsNotificationService
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        CURRENT_PROJECT_VERSION: "9"
        MARKETING_VERSION: "1.0.1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: QDJ93ZUQ9B
        APPLICATION_EXTENSION_API_ONLY: true
        SKIP_INSTALL: true
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: iPhone Distribution
          PROVISIONING_PROFILE_SPECIFIER: Pedals NSE YellowPlus App Store
    entitlements:
      path: Entitlements/PedalsNotificationService.entitlements
      properties:
        keychain-access-groups:
          - $(AppIdentifierPrefix)air.build.pedals.shared
    info:
      path: NSE/Info.plist
      properties:
        CFBundleDisplayName: Pedals Notification Service
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        NSExtension:
          NSExtensionPointIdentifier: com.apple.usernotifications.service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).NotificationService

  PedalsWatch:
    # Xcode 14+ single-target SwiftUI watch app: code lives directly in an
    # application target (there is no legacy WatchKit extension target).
    type: application
    platform: watchOS
    deploymentTarget: "26.0"
    sources:
      - WatchApp
      # Agent brand marks (shared catalog; the app-icon catalog stays
      # target-specific).
      - Resources/AgentMarks.xcassets
      - path: SharedStatus
        excludes:
          - IOSWatchConnectivityBridge.swift
          - TTYActivityAttributes.swift
          - TTYLiveActivityController.swift
    dependencies:
      - package: PedalsKit
        product: PedalsKit
      - target: PedalsWatchWidgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: air.build.pedals.watchapp
        PRODUCT_NAME: PedalsWatch
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "4"
        SWIFT_VERSION: "6.0"
        CURRENT_PROJECT_VERSION: "9"
        MARKETING_VERSION: "1.0.1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: QDJ93ZUQ9B
        SKIP_INSTALL: true
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: iPhone Distribution
          PROVISIONING_PROFILE_SPECIFIER: Pedals Watch YellowPlus App Store
    entitlements:
      path: Entitlements/PedalsWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - group.air.build.pedals
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: Pedals
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        WKApplication: true
        WKCompanionAppBundleIdentifier: air.build.pedals

  PedalsWatchWidgets:
    type: app-extension
    platform: watchOS
    deploymentTarget: "26.0"
    sources:
      - WatchWidgets
      - path: SharedStatus
        excludes:
          - IOSWatchConnectivityBridge.swift
          - TTYActivityAttributes.swift
          - TTYLiveActivityController.swift
          - WatchTerminalContext.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: air.build.pedals.watchapp.widgets
        PRODUCT_NAME: PedalsWatchWidgets
        TARGETED_DEVICE_FAMILY: "4"
        SWIFT_VERSION: "6.0"
        CURRENT_PROJECT_VERSION: "9"
        MARKETING_VERSION: "1.0.1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: QDJ93ZUQ9B
        APS_ENVIRONMENT: development
        APPLICATION_EXTENSION_API_ONLY: true
        SKIP_INSTALL: true
      configs:
        Release:
          APS_ENVIRONMENT: production
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: iPhone Distribution
          PROVISIONING_PROFILE_SPECIFIER: Pedals Watch Widgets YellowPlus App Store
    entitlements:
      path: Entitlements/PedalsWatchWidgets.entitlements
      properties:
        aps-environment: $(APS_ENVIRONMENT)
        com.apple.security.application-groups:
          - group.air.build.pedals
    info:
      path: WatchWidgets/Info.plist
      properties:
        CFBundleDisplayName: Pedals Watch Widgets
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
