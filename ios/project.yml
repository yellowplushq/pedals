name: Pedals
options:
  bundleIdPrefix: app.yellowplus
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  PedalsKit:
    path: ../shared/PedalsKit
  GhosttyKit:
    url: https://github.com/Lakr233/libghostty-spm
    from: 1.3.0

targets:
  Pedals:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Sources
      - Resources
    dependencies:
      - package: PedalsKit
        product: PedalsKit
      - package: GhosttyKit
        product: GhosttyTerminal
      - package: GhosttyKit
        product: GhosttyTheme
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.yellowplus.pedals
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
        CODE_SIGN_STYLE: Automatic
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Pedals
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchStoryboardName: LaunchScreen
        NSCameraUsageDescription: Pedals uses the camera to scan the pairing QR code shown by your Mac.
        CFBundleURLTypes:
          - CFBundleURLName: app.yellowplus.pedals
            CFBundleURLSchemes:
              - pedals
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default
                UISceneDelegateClassName: $(PRODUCT_MODULE_NAME).SceneDelegate
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    scheme:
      testTargets: []
