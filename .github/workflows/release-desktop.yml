name: Release desktop app

on:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, notarize, and publish
    runs-on: macos-26
    timeout-minutes: 45
    env:
      PEDALS_DESKTOP_OUTPUT_DIR: ${{ github.workspace }}/.artifacts/desktop-release
      PEDALS_DESKTOP_BUILD_NUMBER: ${{ github.run_number }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Resolve release version
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#desktop-v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid desktop release tag: $GITHUB_REF_NAME" >&2
            exit 1
          fi
          echo "PEDALS_DESKTOP_VERSION=$version" >> "$GITHUB_ENV"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Test desktop service core
        run: swift test --package-path desktop/PedalsDaemon

      - name: Import Developer ID certificate
        shell: bash
        env:
          CERTIFICATE_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_P12_PASSWORD }}
        run: |
          set -euo pipefail
          certificate="$RUNNER_TEMP/developer-id-application.p12"
          keychain="$RUNNER_TEMP/pedals-signing.keychain-db"
          keychain_password="$(openssl rand -hex 24)"
          printf '%s' "$CERTIFICATE_BASE64" | base64 --decode > "$certificate"
          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          security import "$certificate" \
            -k "$keychain" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$keychain_password" \
            "$keychain"
          security list-keychains -d user -s "$keychain"
          identity="$(security find-identity -v -p codesigning "$keychain" | sed -n 's/.*"\(Developer ID Application:.*\)"/\1/p' | head -n 1)"
          if [[ -z "$identity" ]]; then
            echo "No Developer ID Application identity was imported." >&2
            exit 1
          fi
          echo "PEDALS_SIGNING_IDENTITY=$identity" >> "$GITHUB_ENV"

      - name: Build universal app
        run: ./scripts/build-desktop-release.sh

      - name: Sign app and update framework
        shell: bash
        run: |
          set -euo pipefail
          app="$PEDALS_DESKTOP_OUTPUT_DIR/Pedals.app"
          sparkle="$app/Contents/Frameworks/Sparkle.framework"
          sparkle_contents="$sparkle/Versions/B"
          codesign --force --options runtime --timestamp --sign "$PEDALS_SIGNING_IDENTITY" \
            "$sparkle_contents/XPCServices/Installer.xpc"
          codesign --force --options runtime --timestamp --preserve-metadata=entitlements \
            --sign "$PEDALS_SIGNING_IDENTITY" \
            "$sparkle_contents/XPCServices/Downloader.xpc"
          codesign --force --options runtime --timestamp --sign "$PEDALS_SIGNING_IDENTITY" \
            "$sparkle_contents/Autoupdate"
          codesign --force --options runtime --timestamp --sign "$PEDALS_SIGNING_IDENTITY" \
            "$sparkle_contents/Updater.app"
          codesign --force --options runtime --timestamp --sign "$PEDALS_SIGNING_IDENTITY" "$sparkle"
          # The agent-hook reporter is copied in by the menubar build's
          # post-build script with a development signature; notarization
          # requires every Mach-O to carry Developer ID + secure timestamp.
          codesign --force --options runtime --timestamp --sign "$PEDALS_SIGNING_IDENTITY" \
            "$app/Contents/MacOS/pedals-hook"
          codesign --force --options runtime --timestamp --sign "$PEDALS_SIGNING_IDENTITY" "$app"
          codesign --verify --deep --strict --verbose=2 "$app"
          signing_details="$(codesign -dv --verbose=4 "$app" 2>&1)"
          printf '%s\n' "$signing_details"
          grep -q 'TeamIdentifier=QDJ93ZUQ9B' <<< "$signing_details"
          grep -q 'flags=.*runtime' <<< "$signing_details"
          for component in \
            "$sparkle_contents/XPCServices/Installer.xpc" \
            "$sparkle_contents/XPCServices/Downloader.xpc" \
            "$sparkle_contents/Autoupdate" \
            "$sparkle_contents/Updater.app" \
            "$app/Contents/MacOS/pedals-hook" \
            "$sparkle"; do
            component_details="$(codesign -dv --verbose=4 "$component" 2>&1)"
            grep -q 'TeamIdentifier=QDJ93ZUQ9B' <<< "$component_details"
            grep -q 'flags=.*runtime' <<< "$component_details"
            grep -q '^Timestamp=' <<< "$component_details"
          done

      - name: Package disk image
        run: ./scripts/package-desktop-dmg.sh

      - name: Sign disk image
        shell: bash
        run: |
          set -euo pipefail
          dmg="$PEDALS_DESKTOP_OUTPUT_DIR/Pedals-macOS.dmg"
          codesign --force --timestamp --sign "$PEDALS_SIGNING_IDENTITY" "$dmg"
          codesign --verify --strict --verbose=2 "$dmg"

      - name: Notarize and staple
        shell: bash
        env:
          NOTARY_KEY_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          NOTARY_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          key="$RUNNER_TEMP/AuthKey_${NOTARY_KEY_ID}.p8"
          dmg="$PEDALS_DESKTOP_OUTPUT_DIR/Pedals-macOS.dmg"
          result="$RUNNER_TEMP/pedals-notary-result.json"
          printf '%s' "$NOTARY_KEY_BASE64" | base64 --decode > "$key"
          chmod 600 "$key"
          xcrun notarytool submit "$dmg" \
            --key "$key" \
            --key-id "$NOTARY_KEY_ID" \
            --issuer "$NOTARY_ISSUER_ID" \
            --wait \
            --output-format json > "$result"
          cat "$result"
          notary_status="$(plutil -extract status raw "$result")"
          submission_id="$(plutil -extract id raw "$result")"
          if [[ "$notary_status" != "Accepted" ]]; then
            xcrun notarytool log "$submission_id" \
              --key "$key" \
              --key-id "$NOTARY_KEY_ID" \
              --issuer "$NOTARY_ISSUER_ID" || true
            echo "Apple notarization failed with status: $notary_status" >&2
            exit 1
          fi
          xcrun stapler staple "$dmg"
          xcrun stapler validate "$dmg"
          spctl --assess --type open --context context:primary-signature --verbose=2 "$dmg"

      - name: Create checksum
        shell: bash
        run: |
          set -euo pipefail
          cd "$PEDALS_DESKTOP_OUTPUT_DIR"
          shasum -a 256 Pedals-macOS.dmg > Pedals-macOS.dmg.sha256

      - name: Generate signed update feed
        shell: bash
        env:
          SPARKLE_EDDSA_PRIVATE_KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          appcast_tool="$PEDALS_DESKTOP_OUTPUT_DIR/build/derived-data/SourcePackages/artifacts/sparkle/Sparkle/bin/generate_appcast"
          if [[ ! -x "$appcast_tool" ]]; then
            echo "Sparkle generate_appcast tool was not found at $appcast_tool" >&2
            exit 1
          fi
          printf '%s' "$SPARKLE_EDDSA_PRIVATE_KEY" | "$appcast_tool" \
            --ed-key-file - \
            --download-url-prefix "https://github.com/yellowplushq/pedals/releases/download/$GITHUB_REF_NAME/" \
            --link "https://pedals.air.build" \
            --maximum-versions 1 \
            "$PEDALS_DESKTOP_OUTPUT_DIR"
          test -s "$PEDALS_DESKTOP_OUTPUT_DIR/appcast.xml"
          grep -q 'sparkle:edSignature=' "$PEDALS_DESKTOP_OUTPUT_DIR/appcast.xml"
          grep -q 'sparkle-signatures:' "$PEDALS_DESKTOP_OUTPUT_DIR/appcast.xml"

      - name: Publish GitHub release
        shell: bash
        run: |
          set -euo pipefail
          dmg="$PEDALS_DESKTOP_OUTPUT_DIR/Pedals-macOS.dmg"
          checksum="$PEDALS_DESKTOP_OUTPUT_DIR/Pedals-macOS.dmg.sha256"
          appcast="$PEDALS_DESKTOP_OUTPUT_DIR/appcast.xml"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$dmg" "$checksum" "$appcast" --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              "$dmg" \
              "$checksum" \
              "$appcast" \
              --verify-tag \
              --title "Pedals $PEDALS_DESKTOP_VERSION" \
              --generate-notes
          fi
