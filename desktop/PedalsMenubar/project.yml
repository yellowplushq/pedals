name: PedalsMenubar
options:
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "14.0"
packages:
  PedalsDaemon:
    path: ../PedalsDaemon
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    exactVersion: 2.9.4
targets:
  PedalsMenubar:
    type: application
    platform: macOS
    sources:
      - Sources
      - path: Resources
        buildPhase: resources
    dependencies:
      - package: PedalsDaemon
        product: PedalsDaemonCore
      # Built for the copy-into-bundle step below; not linked.
      - package: PedalsDaemon
        product: pedals-hook
        link: false
      - package: Sparkle
    postBuildScripts:
      - name: Embed pedals-hook reporter
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          cp "$BUILT_PRODUCTS_DIR/pedals-hook" \
            "$TARGET_BUILD_DIR/$CONTENTS_FOLDER_PATH/MacOS/pedals-hook"
          codesign --force --sign "${EXPANDED_CODE_SIGN_IDENTITY:--}" \
            --options runtime \
            "$TARGET_BUILD_DIR/$CONTENTS_FOLDER_PATH/MacOS/pedals-hook"
    scheme:
      testTargets: []
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Pedals
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSUIElement: true
        LSMinimumSystemVersion: "14.0"
        SUAutomaticallyUpdate: true
        SUEnableAutomaticChecks: true
        SUFeedURL: https://pedals.air.build/appcast.xml
        SUPublicEDKey: fU6GOxOohmLiyQM7hTjHvWqfxSQLQ7Z3rQCX2RH34Ds=
        SURequireSignedFeed: true
        SUScheduledCheckInterval: 86400
        SUVerifyUpdateBeforeExtraction: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: air.build.pedals.menubar
        PRODUCT_NAME: Pedals
        MARKETING_VERSION: "1.5.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: true
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
